name: "Run tests"

# Run tests on pull requests to main and on pushes to main
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Run .NET unit tests
        run: bash ./scripts/run-server-tests.sh

  frontend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Build all projects
        run: dotnet build

      - name: Install Playwright browsers
        run: pwsh client/TailspinToys.E2E/bin/Debug/net10.0/playwright.ps1 install --with-deps

      - name: Run Playwright e2e tests
        run: bash ./scripts/run-e2e-tests.sh
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: client/TailspinToys.E2E/bin/Debug/net10.0/playwright-report/
          retention-days: 30
