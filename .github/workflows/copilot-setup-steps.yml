name: "Copilot Setup Steps"

# Allows you to test the setup steps from your repository's "Actions" tab
on: workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    # Set the permissions to the lowest permissions possible needed for *your steps*. Copilot will be given its own token for its operations.
    permissions:
      # If you want to clone the repository as part of your setup steps, for example to install dependencies, you'll need the `contents: read` permission. If you don't clone the repository in your setup steps, Copilot will do this for you automatically after the steps complete.
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # .NET setup
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore .NET dependencies
        run: dotnet restore

      # Node.js setup - required for Copilot CLI and npx-based MCP servers
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      # Build E2E test project to generate Playwright script
      - name: Build E2E tests
        run: dotnet build client/TailspinToys.E2E/

      - name: Install Playwright browsers
        run: pwsh client/TailspinToys.E2E/bin/Debug/net10.0/playwright.ps1 install
